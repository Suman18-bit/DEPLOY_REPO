<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#312e81;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="msgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)" rx="20"/>

  <!-- Animated particles -->
  <circle cx="100" cy="80" r="3" fill="#818cf8" opacity="0.6">
    <animate attributeName="cy" values="80;60;80" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="120" r="4" fill="#f472b6" opacity="0.5">
    <animate attributeName="cy" values="120;100;120" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="300" r="2" fill="#34d399" opacity="0.7">
    <animate attributeName="cy" values="300;280;300" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="320" r="3" fill="#fbbf24" opacity="0.4">
    <animate attributeName="cy" values="320;300;320" dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Sidebar -->
  <rect x="20" y="20" width="220" height="360" fill="#1e293b" rx="16" opacity="0.9"/>
  <rect x="40" y="40" width="180" height="120" fill="#334155" rx="12"/>

  <!-- Upload icon animation -->
  <g transform="translate(110, 85)">
    <path d="M0,-15 L0,5" stroke="#818cf8" stroke-width="3" stroke-linecap="round">
      <animate attributeName="d" values="M0,-15 L0,5;M0,-20 L0,0;M0,-15 L0,5" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M-10,-5 L0,-15 L10,-5" stroke="#818cf8" stroke-width="3" stroke-linecap="round" fill="none">
      <animate attributeName="d" values="M-10,-5 L0,-15 L10,-5;M-10,-10 L0,-20 L10,-10;M-10,-5 L0,-15 L10,-5" dur="2s" repeatCount="indefinite"/>
    </path>
    <rect x="-20" y="5" width="40" height="25" rx="4" stroke="#6366f1" stroke-width="2" fill="none" opacity="0.6"/>
  </g>

  <!-- Chat area -->
  <rect x="260" y="20" width="520" height="360" fill="#0f172a" rx="16" opacity="0.8"/>

  <!-- Bot message -->
  <g transform="translate(290, 80)">
    <circle cx="15" cy="15" r="15" fill="url(#msgGrad)" opacity="0.3"/>
    <circle cx="15" cy="15" r="10" fill="url(#msgGrad)"/>
    <rect x="40" y="0" width="280" height="50" fill="#1e293b" rx="12" ry="12"/>
    <rect x="55" y="15" width="200" height="8" fill="#475569" rx="4">
      <animate attributeName="width" values="200;250;200" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="55" y="30" width="150" height="8" fill="#475569" rx="4"/>
  </g>

  <!-- User message -->
  <g transform="translate(480, 160)">
    <rect x="0" y="0" width="260" height="40" fill="url(#msgGrad)" rx="12" ry="12" filter="url(#glow)"/>
    <rect x="20" y="15" width="180" height="8" fill="white" rx="4" opacity="0.9"/>
    <circle cx="290" cy="20" r="15" fill="#7c3aed" opacity="0.5"/>
  </g>

  <!-- Typing indicator -->
  <g transform="translate(290, 240)">
    <circle cx="15" cy="15" r="15" fill="url(#msgGrad)" opacity="0.3"/>
    <circle cx="15" cy="15" r="10" fill="url(#msgGrad)"/>
    <rect x="40" y="0" width="80" height="35" fill="#1e293b" rx="12" ry="12"/>
    <circle cx="60" cy="18" r="4" fill="#818cf8">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="75" cy="18" r="4" fill="#818cf8">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" begin="0.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="90" cy="18" r="4" fill="#818cf8">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Input bar -->
  <rect x="290" y="340" width="460" height="50" fill="#1e293b" rx="25" ry="25" stroke="#334155" stroke-width="2"/>
  <rect x="320" y="355" width="300" height="8" fill="#475569" rx="4"/>
  <circle cx="710" cy="365" r="18" fill="url(#msgGrad)" filter="url(#glow)">
    <animate attributeName="r" values="18;20;18" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Floating orbs -->
  <circle cx="400" cy="200" r="100" fill="url(#msgGrad)" opacity="0.03">
    <animate attributeName="r" values="100;120;100" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="200" r="60" fill="url(#msgGrad)" opacity="0.05">
    <animate attributeName="r" values="60;80;60" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>