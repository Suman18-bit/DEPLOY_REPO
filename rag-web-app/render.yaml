services:
  - type: web
    name: rag-assistant
    runtime: python
    rootDir: rag-web-app
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn index:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MISTRAL_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
